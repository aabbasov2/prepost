<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KPI Performance Dashboard</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and Babel CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Inline SVG Icons to prevent library loading errors
        const Icon = ({ name, size = 20, className = "", fill = "none" }) => {
            const icons = {
                TrendingUp: <path d="m22 7-8.5 8.5-5-5L2 17M22 7h-6M22 7v6"/>,
                TrendingDown: <path d="m22 17-8.5-8.5-5 5L2 7M22 17h-6M22 17v-6"/>,
                Minus: <path d="M5 12h14"/>,
                Mail: (
                    <>
                        <rect width="20" height="16" x="2" y="4" rx="2"/>
                        <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
                    </>
                ),
                MessageSquare: <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>,
                Phone: <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>,
                CheckCircle: (
                    <>
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                        <polyline points="22 4 12 14.01 9 11.01"/>
                    </>
                ),
                AlertTriangle: (
                    <>
                        <path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/>
                        <line x1="12" x2="12" y1="9" y2="13"/>
                        <line x1="12" x2="12.01" y1="17" y2="17"/>
                    </>
                ),
                Clock: (
                    <>
                        <circle cx="12" cy="12" r="10"/>
                        <polyline points="12 6 12 12 16 14"/>
                    </>
                ),
                Target: (
                    <>
                        <circle cx="12" cy="12" r="10"/>
                        <circle cx="12" cy="12" r="6"/>
                        <circle cx="12" cy="12" r="2"/>
                    </>
                ),
                ArrowUpRight: <path d="M7 7h10v10M7 17 17 7"/>,
                ArrowDownRight: <path d="m7 7 10 10M17 7v10H7"/>,
                Zap: <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>,
                Activity: <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>,
                History: (
                    <>
                        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
                        <path d="M3 3v5h5"/>
                        <path d="M12 7v5l4 2"/>
                    </>
                )
            };

            return (
                <svg 
                    width={size} 
                    height={size} 
                    viewBox="0 0 24 24" 
                    fill={fill} 
                    stroke="currentColor" 
                    strokeWidth="2" 
                    strokeLinecap="round" 
                    strokeLinejoin="round" 
                    className={className}
                >
                    {icons[name] || null}
                </svg>
            );
        };

        const App = () => {
            const [isVisible, setIsVisible] = useState(false);

            useEffect(() => {
                const timer = setTimeout(() => setIsVisible(true), 100);
                return () => clearTimeout(timer);
            }, []);

            const dashboardMetrics = [
                {
                    category: "Customer Satisfaction",
                    metrics: [
                        { name: "Resolution Rate", pre: 62.50, post: 44.44, unit: "%", lowerIsBetter: false, volume: { pre: "24 surveys", post: "18 surveys" } },
                        { name: "Quality Score", pre: 67.9, post: 97.0, unit: "%", lowerIsBetter: false, volume: { pre: "56 reviews", post: "33 reviews" } }
                    ]
                },
                {
                    category: "Average Handling Time (MHT)",
                    metrics: [
                        { name: "Email MHT", pre: 9.13, post: 8.45, unit: " mins", lowerIsBetter: true, icon: "Mail" },
                        { name: "Chat MHT", pre: 13.69, post: 11.98, unit: " mins", lowerIsBetter: true, icon: "MessageSquare" },
                        { name: "Phone MHT", pre: 13.37, post: 11.40, unit: " mins", lowerIsBetter: true, icon: "Phone" }
                    ]
                },
                {
                    category: "Operations & Compliance",
                    metrics: [
                        { name: "Escalation Rate", pre: 1.6, post: 5.8, unit: "%", lowerIsBetter: true },
                        { name: "Email Adherence", pre: 94.13, post: 94.58, unit: "%", lowerIsBetter: false },
                        { name: "Chat Adherence", pre: 95.46, post: 93.90, unit: "%", lowerIsBetter: false },
                        { name: "Phone Adherence", pre: 92.32, post: 92.92, unit: "%", lowerIsBetter: false }
                    ]
                }
            ];

            const calculateDelta = (pre, post) => {
                const diff = post - pre;
                const percent = ((diff / pre) * 100).toFixed(1);
                return { diff: diff.toFixed(2), percent: percent > 0 ? `+${percent}%` : `${percent}%` };
            };

            const getStatusClasses = (pre, post, lowerIsBetter) => {
                if (pre === post) return { text: "text-slate-400", bg: "bg-slate-50", border: "border-slate-100", icon: "Minus", bar: "bg-slate-500" };
                const improved = lowerIsBetter ? post < pre : post > pre;
                return improved 
                    ? { text: "text-emerald-600", bg: "bg-emerald-50", border: "border-emerald-100", icon: "ArrowUpRight", bar: "bg-emerald-500" }
                    : { text: "text-rose-600", bg: "bg-rose-50", border: "border-rose-100", icon: "ArrowDownRight", bar: "bg-rose-500" };
            };

            return (
                <div className={`min-h-screen bg-[#f8fafc] transition-opacity duration-1000 ${isVisible ? 'opacity-100' : 'opacity-0'} pb-20 relative`}>
                    {/* Decorative background blurs */}
                    <div className="fixed inset-0 overflow-hidden pointer-events-none">
                        <div className="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] rounded-full bg-indigo-100/40 blur-[120px]"></div>
                        <div className="absolute top-[10%] right-[0%] w-[30%] h-[30%] rounded-full bg-blue-100/30 blur-[100px]"></div>
                    </div>

                    <div className="relative max-w-7xl mx-auto px-6 lg:px-8">
                        {/* Navigation */}
                        <nav className="py-8 flex justify-between items-center border-b border-slate-200/60 mb-10">
                            <div className="flex items-center gap-3">
                                <div className="w-11 h-11 bg-indigo-600 rounded-2xl flex items-center justify-center shadow-xl shadow-indigo-200">
                                    <Icon name="Zap" className="text-white" size={22} fill="white" />
                                </div>
                                <div>
                                    <span className="font-black text-xl tracking-tight text-slate-800 block leading-none uppercase">PMP Analytics</span>
                                    <span className="text-[10px] font-bold text-slate-400 tracking-[0.2em] uppercase">Operations Dashboard</span>
                                </div>
                            </div>
                            <div className="hidden md:flex items-center gap-4">
                                <span className="text-xs font-bold text-slate-500 glass-card px-4 py-2 rounded-xl border border-slate-200 shadow-sm">Report Period: 2024</span>
                            </div>
                        </nav>

                        <header className="mb-14">
                            <div className="inline-flex items-center gap-2 px-3 py-1.5 rounded-full bg-white border border-slate-200 shadow-sm text-slate-600 text-[10px] font-black uppercase tracking-widest mb-6">
                                <Icon name="History" size={14} className="text-indigo-500" /> Comparison: Pre vs Post PMP
                            </div>
                            <h1 className="text-5xl md:text-6xl font-black text-slate-900 tracking-tighter leading-[0.9] mb-4">
                                Performance <span className="text-indigo-600">Delta</span>.
                            </h1>
                            <p className="text-lg text-slate-500 max-w-2xl font-medium leading-relaxed">
                                A comprehensive look at operational shifts following the PMP implementation. Significant gains in quality are offset by volume-based resolution challenges.
                            </p>
                        </header>

                        {/* Metric Categories */}
                        <div className="space-y-24">
                            {dashboardMetrics.map((section, idx) => (
                                <section key={idx}>
                                    <div className="flex items-end justify-between mb-10 gap-4">
                                        <div>
                                            <span className="text-indigo-600 font-black text-xs uppercase tracking-[0.3em] mb-2 block">Metric Group 0{idx + 1}</span>
                                            <h2 className="text-3xl font-black text-slate-900 tracking-tight uppercase">{section.category}</h2>
                                        </div>
                                        <div className="hidden sm:flex gap-4 mb-1 text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                                            <div className="flex items-center gap-2">
                                                <div className="w-3 h-1.5 rounded-full bg-slate-200"></div> Pre
                                            </div>
                                            <div className="flex items-center gap-2">
                                                <div className="w-3 h-1.5 rounded-full bg-indigo-500"></div> Post
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                        {section.metrics.map((m, mIdx) => {
                                            const status = getStatusClasses(m.pre, m.post, m.lowerIsBetter);
                                            const delta = calculateDelta(m.pre, m.post);
                                            const isImproved = m.lowerIsBetter ? m.post < m.pre : m.post > m.pre;
                                            const denominator = m.unit === "%" ? 100 : Math.max(m.pre, m.post) * 1.1;
                                            
                                            return (
                                                <div key={mIdx} className="group bg-white rounded-[2rem] border border-slate-200/60 p-8 hover:shadow-[0_20px_50px_rgba(79,70,229,0.1)] transition-all duration-500 flex flex-col justify-between relative overflow-hidden">
                                                    <div className="relative z-10">
                                                        <div className="flex justify-between items-start mb-8">
                                                            <div>
                                                                <div className="flex items-center gap-2 mb-1">
                                                                    {m.icon && <Icon name={m.icon} size={12} className="text-indigo-400" />}
                                                                    <h4 className="text-slate-400 text-[10px] font-black uppercase tracking-[0.2em]">{m.name}</h4>
                                                                </div>
                                                                <div className="flex items-baseline gap-1">
                                                                    <span className="text-4xl font-black text-slate-900 tracking-tighter">{m.post}</span>
                                                                    <span className="text-lg font-bold text-slate-300">{m.unit}</span>
                                                                </div>
                                                            </div>
                                                            <div className={`flex items-center gap-1.5 px-3 py-1.5 rounded-xl text-[11px] font-black border shadow-sm transition-transform group-hover:scale-105 ${status.bg} ${status.text} ${status.border}`}>
                                                                <Icon name={status.icon} size={14} /> {delta.percent}
                                                            </div>
                                                        </div>

                                                        <div className="space-y-5 mb-8">
                                                            <div className="space-y-2">
                                                                <div className="flex justify-between items-center px-1">
                                                                    <span className="text-[9px] font-black text-slate-400 uppercase tracking-widest">Comparative Reach</span>
                                                                    <span className="text-[9px] font-black text-slate-300 uppercase italic">Base: {m.pre}{m.unit}</span>
                                                                </div>
                                                                <div className="h-6 w-full bg-slate-50 rounded-xl p-1 border border-slate-100 flex flex-col justify-center space-y-1">
                                                                    <div className="h-1.5 bg-slate-200 rounded-full transition-all duration-1000 overflow-hidden">
                                                                        <div className="h-full bg-slate-300" style={{ width: `${(m.pre / denominator) * 100}%` }}></div>
                                                                    </div>
                                                                    <div className="h-1.5 bg-slate-200 rounded-full transition-all duration-1000 overflow-hidden">
                                                                        <div className={`h-full ${status.bar} shadow-sm transition-all duration-1000`} style={{ width: `${(m.post / denominator) * 100}%` }}></div>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    </div>

                                                    <div className="relative z-10 pt-6 border-t border-slate-50 flex justify-between items-center">
                                                        <div>
                                                            {m.volume && (
                                                                <div className="text-[10px] font-bold text-slate-400 uppercase flex items-center gap-1.5">
                                                                    <Icon name="CheckCircle" size={10} className="text-emerald-500" /> {m.volume.post} sample
                                                                </div>
                                                            )}
                                                        </div>
                                                        <div className={`text-[10px] font-black uppercase tracking-widest px-2 py-0.5 rounded-md ${isImproved ? 'text-emerald-500 bg-emerald-50' : 'text-rose-500 bg-rose-50'}`}>
                                                            {isImproved ? 'Improvement' : 'Regression'}
                                                        </div>
                                                    </div>
                                                    <div className={`absolute -right-4 -bottom-4 w-24 h-24 rounded-full opacity-[0.03] pointer-events-none transition-transform group-hover:scale-150 duration-700 ${isImproved ? 'bg-emerald-500' : 'bg-rose-500'}`}></div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </section>
                            ))}
                        </div>

                        {/* Strategy Panel */}
                        <section className="mt-32">
                            <div className="bg-slate-900 rounded-[3.5rem] p-10 md:p-16 text-white relative overflow-hidden shadow-2xl shadow-indigo-900/20">
                                <div className="absolute top-0 right-0 w-1/2 h-full bg-gradient-to-bl from-indigo-500/10 to-transparent pointer-events-none"></div>
                                <div className="relative z-10 grid grid-cols-1 lg:grid-cols-12 gap-12 items-start">
                                    <div className="lg:col-span-5">
                                        <div className="w-14 h-14 bg-indigo-500 rounded-2xl flex items-center justify-center mb-8 shadow-lg shadow-indigo-500/20">
                                            <Icon name="Target" size={28} className="text-white" />
                                        </div>
                                        <h2 className="text-4xl font-black tracking-tighter mb-6 leading-tight uppercase">Strategy Summary</h2>
                                        <p className="text-slate-400 text-lg font-medium leading-relaxed mb-8">
                                            The PMP strategy shows a clear prioritization of quality over volume. While efficiency (MHT) is tracking positively, the drop in resolution suggests a potential gap in knowledge or resource availability at the front line.
                                        </p>
                                    </div>
                                    <div className="lg:col-span-7 grid grid-cols-1 sm:grid-cols-2 gap-6">
                                        <div className="bg-white/5 border border-white/10 p-8 rounded-[2.5rem] backdrop-blur-md">
                                            <div className="flex items-center gap-3 mb-4 text-emerald-400">
                                                <Icon name="TrendingUp" size={20} />
                                                <span className="text-xs font-black uppercase tracking-widest">Key Victory</span>
                                            </div>
                                            <p className="text-slate-100 font-bold leading-relaxed">
                                                Quality scores reached an unprecedented <span className="text-emerald-400">97%</span>. This marks a fundamental shift in service excellence.
                                            </p>
                                        </div>
                                        <div className="bg-white/5 border border-white/10 p-8 rounded-[2.5rem] backdrop-blur-md">
                                            <div className="flex items-center gap-3 mb-4 text-indigo-400">
                                                <Icon name="Clock" size={20} />
                                                <span className="text-xs font-black uppercase tracking-widest">Efficiency</span>
                                            </div>
                                            <p className="text-slate-100 font-bold leading-relaxed">
                                                Handling times reduced by <span className="text-indigo-400">13%</span> on average, freeing up significant operational capacity.
                                            </p>
                                        </div>
                                        <div className="bg-rose-500/10 border border-rose-500/20 p-8 rounded-[2.5rem] backdrop-blur-md sm:col-span-2">
                                            <div className="flex items-center gap-3 mb-4 text-rose-400">
                                                <Icon name="AlertTriangle" size={20} />
                                                <span className="text-xs font-black uppercase tracking-widest">Primary Risk</span>
                                            </div>
                                            <p className="text-slate-100 font-bold leading-relaxed mb-4">
                                                The <span className="text-rose-400">18.1% drop</span> in resolution and the spike in escalation rates require immediate attention to ensure customer satisfaction isn't sacrificed for speed.
                                            </p>
                                            <div className="h-1.5 w-full bg-white/5 rounded-full overflow-hidden">
                                                <div className="h-full bg-rose-500" style={{ width: '18.1%' }}></div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </section>

                        <footer className="mt-24 border-t border-slate-200 pt-10 flex flex-col md:flex-row justify-between items-center gap-6">
                            <div className="flex items-center gap-2 opacity-50">
                                <Icon name="Zap" size={16} className="text-indigo-600" fill="#4f46e5" />
                                <span className="text-[10px] font-black uppercase tracking-[0.2em] text-slate-500">PMP Analytics Engine v2.0</span>
                            </div>
                            <div className="flex gap-8 text-[10px] font-black uppercase tracking-[0.2em] text-slate-400">
                                <span>Internal Performance Report</span>
                            </div>
                        </footer>
                    </div>
                </div>
            );
        };

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
